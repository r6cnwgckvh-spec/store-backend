<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Store Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="backBtn" onclick="goBack()">&#8592;</button>
      <h1 id="pageTitle">Store Manager</h1>
      <button id="menuBtn" onclick="toggleMenu()">&#9776;</button>
    </header>

    <main id="main"></main>

    <nav id="bottomNav">
      <button class="nav-item active" data-page="home" onclick="navigate('home')">
        <span class="nav-icon">&#8962;</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="products" onclick="navigate('products')">
        <span class="nav-icon">&#128230;</span>
        <span class="nav-label">Products</span>
      </button>
      <button class="nav-item" data-page="cart" onclick="navigate('cart')">
        <span class="nav-icon">&#128722;</span>
        <span class="nav-label">Cart</span>
        <span id="cartBadge" class="badge hidden">0</span>
      </button>
      <button class="nav-item" data-page="orders" onclick="navigate('orders')">
        <span class="nav-icon">&#128203;</span>
        <span class="nav-label">Orders</span>
      </button>
      <button class="nav-item" data-page="customers" onclick="navigate('customers')">
        <span class="nav-icon">&#128101;</span>
        <span class="nav-label">Customers</span>
      </button>
    </nav>

    <div id="menuOverlay" class="hidden" onclick="hideMenu()"></div>
    <div id="sideMenu" class="hidden">
      <div class="menu-header">
        <h3>Store Manager</h3>
        <button onclick="hideMenu()">&times;</button>
      </div>
      <div class="menu-body">
        <button onclick="navigate('home');hideMenu()">&#8962; Dashboard</button>
        <button onclick="navigate('products');hideMenu()">&#128230; Products</button>
        <button onclick="navigate('scan');hideMenu()">&#128247; Scan Barcode</button>
        <button onclick="navigate('cart');hideMenu()">&#128722; Cart / Billing</button>
        <button onclick="navigate('orders');hideMenu()">&#128203; Order History</button>
        <button onclick="navigate('customers');hideMenu()">&#128101; Customers</button>
        <button onclick="navigate('settings');hideMenu()">&#9881; Store Settings</button>
        <button onclick="navigate('reports');hideMenu()">&#128200; Sales Reports</button>
        <button onclick="navigate('purchases');hideMenu()">&#11014; Stock In</button>
        <button onclick="navigate('categories');hideMenu()">&#128193; Categories</button>
        <button onclick="navigate('backup');hideMenu()">&#128427; Backup &amp; Restore</button>
        <hr>
        <button onclick="navigate('products/add');hideMenu()">&#10133; Add Product</button>
        <button onclick="navigate('customers/add');hideMenu()">&#10133; Add Customer</button>
        <button onclick="toggleDarkMode()" id="darkModeMenuBtn">&#127763; Dark Mode</button>
      </div>
    </div>

    <div id="scannerModal" class="modal hidden">
      <div class="modal-content scanner-content">
        <div class="modal-header">
          <h2>Scan Barcode / QR</h2>
          <button onclick="closeScanner()">&times;</button>
        </div>
        <div id="scannerContainer"></div>
        <p id="scannerHint">Point camera at a barcode or QR code</p>
        <p id="scannerResult"></p>
        <button class="btn btn-secondary" onclick="closeScanner()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
