<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Store Manager</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <strong>Store Manager</strong>
      <button class="close-btn" onclick="toggleSidebar()">✕</button>
    </div>
    <div id="sidebar-menu"></div>
    <div id="sidebar-footer">Made by Kishan ❤️</div>
  </div>
  <div id="main-content">
    <div id="topbar">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2 id="page-title">Dashboard</h2>
      <button id="theme-btn" onclick="toggleDarkMode()">🌙</button>
    </div>
    <div id="content-area"></div>
  </div>
</div>
<div id="modal-overlay" onclick="closeModal()"></div>
<div id="modal-container"><div id="modal-content"></div></div>
<div id="loading-toast">Loading...</div>
<script src="app.js"></script>
</body>
</html>
